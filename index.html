<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1N Arquiteturas</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
        }
        #slider {
            display: flex;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .page {
            min-width: 100%;
            transition: transform 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
        }
        h1 {
            color: #ffee04;
        }
        .nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .nav button {
            background-color: #ffee04;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="slider">
        <div class="page" id="cover">
            <h1>Z1N Arquiteturas</h1>
            <p>Contact: José Luís Navarro</p>
        </div>
        <div class="page" id="services">
            <h1>Experience / Services</h1>
            <p>Details about services offered.</p>
        </div>
        <div class="page" id="portfolio1">
            <h1>Portfolio - Folha 3</h1>
            <img src="Folha 3.png" alt="Folha 3">
        </div>
        <div class="page" id="portfolio2">
            <h1>Portfolio - Folha 4</h1>
            <img src="Folha 4.png" alt="Folha 4">
        </div>
        <div class="page" id="portfolio3">
            <h1>Portfolio - Folha 5</h1>
            <img src="Folha 5.png" alt="Folha 5">
        </div>
        <div class="page" id="about">
            <h1>About Us</h1>
            <p>Information about Z1N Arquiteturas.</p>
        </div>
        <div class="page" id="differentials">
            <h1>Differentials</h1>
            <p>What makes us unique.</p>
        </div>
        <div class="page" id="contact">
            <h1>Contact</h1>
            <p>Contact information.</p>
        </div>
    </div>
    <div class="nav">
        <button onclick="previousPage()">&#10094; Prev</button>
        <button onclick="nextPage()">Next &#10095;</button>
    </div>
    <script>
        let currentPage = 0;
        const pages = document.querySelectorAll('.page');

        function updateSlider() {
            pages.forEach((page, index) => {
                page.style.transform = 'translateX(' + (index - currentPage) * 100 + '%)';
            });
        }

        function nextPage() {
            currentPage = (currentPage + 1) % pages.length;
            updateSlider();
        }

        function previousPage() {
            currentPage = (currentPage - 1 + pages.length) % pages.length;
            updateSlider();
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                nextPage();
            } else if (event.key === 'ArrowLeft') {
                previousPage();
            }
        });

        // Touch and swipe gestures can be added for mobile responsiveness
        // ... (This would require additional code for touch detection) 
    </script>
</body>
</html>
